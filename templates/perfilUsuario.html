<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIDUCCI – Mi Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/paginaPrincipal.css" />
  <link rel="stylesheet" href="/static/css/perfilUsuario.css" />
</head>
<body class="dashboard-body">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-linea-l"></div>
      <h1 class="sidebar-marca">FIDUCCI</h1>
      <p class="sidebar-subtitulo">Agenda de Contactos</p>
      <div class="sidebar-divisor"></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item">
        <svg class="nav-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Contactos
      </a>
      <a href="/favoritos" class="nav-item">
        <svg class="nav-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        Favoritos
      </a>
      <a href="/actividad" class="nav-item">
        <svg class="nav-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Actividad
      </a>
      <a href="/reporte" class="nav-item">
        <svg class="nav-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Reporte
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-divisor"></div>
      <div class="usuario-info activo" style="cursor:pointer;" title="Mi perfil" onclick="window.location.href='/perfil'">
        <div class="usuario-avatar" id="usuarioAvatar">D</div>
        <div class="usuario-datos">
          <span class="usuario-nombre" id="usuarioNombre">Cargando...</span>
          <span class="usuario-rol" id="usuarioRol">–</span>
        </div>
        <svg style="width:14px;height:14px;color:rgba(255,255,255,0.4);flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>
      <p class="sidebar-copy">© 2026 FIDUCCI</p>
    </div>
  </aside>

  <main class="main-content">

    <div class="perfil-topbar">
      <div>
        <h2 class="content-titulo">Mi Perfil</h2>
        <p class="content-meta">Gestiona tu información personal y seguridad</p>
      </div>
      <button class="btn-secondary btn-cerrar-sesion" onclick="cerrar_sesion()">Cerrar sesión</button>
    </div>

    <div id="vistaPerfil" class="perfil-wrapper">

      <div class="perfil-card">
        <div class="perfil-identidad">
          <div class="perfil-avatar-grande" id="perfilAvatar">D</div>
          <div>
            <h3 class="perfil-nombre-display" id="perfilNombreDisplay">–</h3>
            <p class="perfil-rol-display" id="perfilRolDisplay">–</p>
          </div>
        </div>

        <div class="perfil-divisor"></div>

        <form id="formularioPerfil" onsubmit="return false;">

          <div class="field-row-two">
            <div class="field-group">
              <label for="pNombre">Nombre</label>
              <input type="text" id="pNombre" class="field-input" placeholder="Nombre" />
            </div>
            <div class="field-group">
              <label for="pApellido">Apellidos</label>
              <input type="text" id="pApellido" class="field-input" placeholder="Apellidos" />
            </div>
          </div>

          <div class="field-row-two">
            <div class="field-group">
              <label for="pEmail">Correo electrónico</label>
              <input type="email" id="pEmail" class="field-input" placeholder="correo@ejemplo.com" />
            </div>
            <div class="field-group">
              <label for="pTelefono">Teléfono</label>
              <input type="tel" id="pTelefono" class="field-input" placeholder="+506 0000-0000" />
            </div>
          </div>

          <div class="field-row-two">
            <div class="field-group">
              <label for="pCargo">Cargo</label>
              <input type="text" id="pCargo" class="field-input" placeholder="Administrador" />
            </div>
            <div class="field-group">
              <label for="pEmpresa">Empresa</label>
              <input type="text" id="pEmpresa" class="field-input" placeholder="FIDUCCI" />
            </div>
          </div>

          <div class="perfil-seccion-titulo">Cambiar Contraseña</div>

          <div class="field-row-two">
            <div class="field-group">
              <label for="pPwActual">Contraseña actual</label>
              <input type="password" id="pPwActual" class="field-input" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <div class="field-group">
              <label for="pPwNueva">Nueva contraseña</label>
              <input type="password" id="pPwNueva" class="field-input" placeholder="••••••••" autocomplete="new-password" />
            </div>
          </div>

          <div class="field-group perfil-campo-confirm">
            <label for="pPwConfirm">Confirmar nueva contraseña</label>
            <input type="password" id="pPwConfirm" class="field-input" placeholder="••••••••" autocomplete="new-password" />
          </div>

          <div class="alert alert-error hidden" id="alertaError" style="margin-top:12px;">
            <span class="alert-icon">✕</span>
            <span class="alert-text" id="alertaErrorTexto"></span>
          </div>

          <div class="alert alert-success hidden" id="alertaExito" style="margin-top:12px;">
            <span class="alert-icon">✓</span>
            <span class="alert-text" id="alertaExitoTexto"></span>
          </div>

          <div class="perfil-acciones">
            <button type="submit" class="btn-primary btn-guardar-perfil" onclick="guardar_perfil()">
              <span id="guardarTexto">Guardar cambios</span>
              <span class="btn-spinner hidden" id="guardarSpinner"></span>
            </button>
          </div>

        </form>
      </div>
    </div>

  </main>

  <script src="/static/JavaScript/perfilUsuario.js"></script>
</body>
</html>
