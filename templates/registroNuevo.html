<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIDUCCI – Crear cuenta</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/registroNuevo.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <aside class="brand-panel">
    <div class="brand-corner"></div>

    <div class="brand-content">
      <h1 class="brand-name">FIDUCCI</h1>
      <div class="brand-divider"></div>
      <p class="brand-tagline">Únete a FIDUCCI y gestiona<br>tus contactos de forma profesional.</p>
      <blockquote class="brand-quote">"Organiza tu mundo,<br>conecta con confianza."</blockquote>
      <div class="brand-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <footer class="brand-footer">
      Sistema seguro &nbsp;·&nbsp; Datos protegidos &nbsp;·&nbsp; © 2026
    </footer>
  </aside>

  <main class="auth-panel">
    <div class="auth-card" id="card-register">
      <div class="card-top-bar"></div>
      <div class="card-body">

        <h2 class="card-title">Crea tu cuenta</h2>
        <p class="card-subtitle">Completa la información para comenzar</p>
        <hr class="card-divider" />

        <div id="register-error" class="alert alert-error hidden">
          <span class="alert-icon">✕</span>
          <span class="alert-text"></span>
        </div>

        <div class="field-row-two">
          <div class="field-group">
            <label for="reg-nombre">Nombre <span class="required">*</span></label>
            <input id="reg-nombre" type="text" placeholder="Ana Cecilia" autocomplete="given-name" />
          </div>
          <div class="field-group">
            <label for="reg-apellido">Apellido <span class="required">*</span></label>
            <input id="reg-apellido" type="text" placeholder="Vargas" autocomplete="family-name" />
          </div>
        </div>

        <div class="field-group">
          <label for="reg-email">Correo electrónico <span class="required">*</span></label>
          <input id="reg-email" type="email" placeholder="correo@empresa.com" autocomplete="email" />
        </div>

        <div class="field-group">
          <label for="reg-password">Contraseña <span class="required">*</span></label>
          <div class="input-wrapper">
            <input id="reg-password" type="password" placeholder="•••••••• (mín. 8 caracteres)" autocomplete="new-password" />
            <button class="toggle-pw" type="button" aria-label="Mostrar contraseña" data-target="reg-password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="field-group">
          <label for="reg-confirm">Confirmar contraseña <span class="required">*</span></label>
          <div class="input-wrapper">
            <input id="reg-confirm" type="password" placeholder="••••••••" autocomplete="new-password" />
            <button class="toggle-pw" type="button" aria-label="Mostrar contraseña" data-target="reg-confirm">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <div class="strength-wrap">
            <span class="strength-label">Fortaleza: <strong id="strength-text">—</strong></span>
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
          </div>
        </div>

        <label class="checkbox-label terms-label">
          <input type="checkbox" id="terms" />
          <span>Acepto los <a href="#" class="terms-link">Términos de Uso</a> y <a href="#" class="terms-link">Política de Privacidad</a></span>
        </label>

        <button class="btn-primary" id="btn-register">Crear cuenta</button>

        <p class="card-helper">
          ¿Ya tienes cuenta? <a href="/" class="terms-link">Iniciar sesión →</a>
        </p>

      </div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='JavaScript/registroNuevo.js') }}"></script>
</body>
</html>
